name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Ruff
        env:
          PYTHONPATH: src
        run: ruff check .

      - name: Black
        env:
          PYTHONPATH: src
        run: black --check .

      - name: Mypy
        env:
          PYTHONPATH: src
        run: mypy src tests

      - name: Pytest
        env:
          PYTHONPATH: src
          QT_QPA_PLATFORM: offscreen
        run: pytest
