name: Release

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel and source distribution
        run: python -m build

      - name: Verify package metadata
        run: python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  desktop-artifacts:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install desktop build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller

      - name: Build Windows executable
        if: runner.os == 'Windows'
        run: python scripts/build_windows.py

      - name: Build Linux/macOS executable
        if: runner.os != 'Windows'
        run: |
          pyinstaller src/tidal_playlist_builder/__main__.py \
            --name TidalPlaylistBuilder \
            --noconfirm \
            --clean \
            --windowed \
            --onefile \
            --paths src \
            --collect-data tidal_playlist_builder.resources \
            --distpath dist/desktop/${{ runner.os }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}
          path: dist/desktop/**
          if-no-files-found: error
